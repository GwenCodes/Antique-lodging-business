<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .slider-wrapper {
          position: relative;
          width: 100%;
          max-width: 800px;
          margin: 0 auto;
        }
        .slider {
          display: flex;
          overflow: hidden;
        }
        .slide {
          min-width: 100%;
          transition: transform 0.5s ease-in-out;
        }
        .slide img {
          width: 100%;
          display: block;
        }
        .slider-controls {
          position: absolute;
          bottom: 10px;
          left: 50%;
          transform: translateX(-50%);
        }
        .slider-controls a {
          display: inline-block;
          width: 20px;
          height: 20px;
          margin: 0 5px;
          background-color: rgba(255, 255, 255, 0.5);
          border-radius: 50%;
          text-align: center;
          line-height: 20px;
          color: #333;
          text-decoration: none;
        }
        .slider-controls a.active {
          background-color: rgba(255, 255, 255, 0.9);
        }
      </style>
</head>
<body>
        <section class="slider-wrapper" />
          <div class="slider">
            <div class="slide active">
              <img src="/img/bedroom-a.jpg" alt="Slide 1" id="slide-1"/>
            </div>
            <div class="slide">
              <img src="/img/bedroom-a1.jpg" alt="Slide 2" id="slide-2"/>
            </div>
            <div class="slide">
              <img src="/img/bedroom-c.jpg" alt="Slide 3" id="slide-3"/>
            </div>
            <div class="slide">
              <img src="/img/exterior.jpg" alt="Slide 4" id="slide-4"/>
            </div>
            <div class="slide">
              <img src="/img/exterior-1.jpg" alt="Slide 5" id="slide-5"/>
            </div>
            <div class="slide">
              <img src="/img/shared-dining.jpg" alt="Slide 6" id="slide-6"/>
            </div>
          </div>
          <div class="slider-controls">
            <a href="#slide-1">1</a>
            <a href="#slide-2">2</a>
            <a href="#slide-3">3</a>
            <a href="#slide-4">4</a>
            <a href="#slide-5">5</a>
            <a href="#slide-6">6</a>
          </div>
        </section>
</body>
</html>
